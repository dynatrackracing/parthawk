<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PartHawk — Weekly Restock Report</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{--bg:#0a0a0a;--surface:#141414;--surface2:#1c1c1c;--border:#2a2a2a;--green:#22c55e;--green-dim:#064e3b;--yellow:#eab308;--yellow-dim:#713f12;--orange:#f97316;--orange-dim:#7c2d12;--red:#ef4444;--red-dim:#7f1d1d;--gray:#6b7280;--text:#f9fafb;--text-mid:#d1d5db;--text-muted:#6b7280}
  body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
  header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;justify-content:space-between}
  header h1{font-size:18px;font-weight:700;letter-spacing:-0.03em}
  header .sub{font-size:11px;color:var(--text-muted);margin-top:1px}
  .nav{font-size:12px;color:var(--text-muted);text-decoration:none;display:flex;gap:12px}
  .nav a{color:var(--text-muted);text-decoration:none}.nav a:hover{color:var(--text)}
  .summary{display:flex;gap:8px;padding:12px 20px;flex-wrap:wrap}
  .stat{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:8px 12px;min-width:80px}
  .stat-label{font-size:9px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.06em}
  .stat-value{font-size:18px;font-weight:800;margin-top:1px}
  .sg{color:var(--green)}.sy{color:var(--yellow)}.so{color:var(--orange)}.sr{color:var(--red)}.sgr{color:var(--gray)}
  .section{padding:0 20px 12px}
  .section-header{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;padding:8px 0;border-bottom:1px solid var(--border);margin-bottom:4px;display:flex;justify-content:space-between}
  .sh-green{color:var(--green)}.sh-yellow{color:var(--yellow)}.sh-orange{color:var(--orange)}.sh-red{color:var(--red)}.sh-grey{color:var(--gray)}
  table{width:100%;border-collapse:collapse;font-size:11px}
  th{text-align:left;padding:4px 6px;color:var(--text-muted);font-weight:600;font-size:9px;text-transform:uppercase;letter-spacing:0.05em;border-bottom:1px solid var(--border)}
  td{padding:5px 6px;border-bottom:1px solid #1a1a1a;color:var(--text-mid)}
  tr:hover td{background:var(--surface2)}
  .badge{font-size:9px;font-weight:700;padding:2px 5px;border-radius:3px;white-space:nowrap}
  .b-green{background:var(--green-dim);color:var(--green)}.b-yellow{background:var(--yellow-dim);color:var(--yellow)}.b-orange{background:var(--orange-dim);color:var(--orange)}.b-red{background:var(--red-dim);color:var(--red)}.b-grey{background:#1f2937;color:var(--gray)}
  .mono{font-family:monospace;font-size:10px}
  .profit-pos{color:var(--green)}.profit-neg{color:var(--red)}
  .loading{text-align:center;padding:40px;color:var(--text-muted)}
  .spinner{width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 10px}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<header>
  <div>
    <h1>Weekly Restock Report</h1>
    <div class="sub" id="sub">Loading...</div>
  </div>
  <div class="nav">
    <a href="/admin/pull">Attack List</a>
    <a href="/">Home</a>
  </div>
</header>
<div class="summary" id="summary"></div>
<div id="content"><div class="loading"><div class="spinner"></div>Generating report...</div></div>
<script>
const TIER_CONFIG = {
  green:  { icon: '🟢', label: 'RESTOCK NOW',  badge: 'b-green',  header: 'sh-green' },
  yellow: { icon: '🟡', label: 'STRONG BUY',   badge: 'b-yellow', header: 'sh-yellow' },
  orange: { icon: '🟠', label: 'CONSIDER',     badge: 'b-orange', header: 'sh-orange' },
  red:    { icon: '🔴', label: 'LOW PRIORITY', badge: 'b-red',    header: 'sh-red' },
  grey:   { icon: '⚪', label: 'ON RADAR',     badge: 'b-grey',   header: 'sh-grey' },
};

async function load() {
  try {
    const res = await fetch('/restock/report');
    const d = await res.json();
    if (!d.success) throw new Error(d.error);

    const date = new Date(d.generatedAt).toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
    document.getElementById('sub').textContent = date + ' — ' + d.summary.total + ' part groups scored';

    document.getElementById('summary').innerHTML =
      `<div class="stat"><div class="stat-label">Green 80-100</div><div class="stat-value sg">${d.summary.green}</div></div>` +
      `<div class="stat"><div class="stat-label">Yellow 60-79</div><div class="stat-value sy">${d.summary.yellow}</div></div>` +
      `<div class="stat"><div class="stat-label">Orange 40-59</div><div class="stat-value so">${d.summary.orange}</div></div>` +
      `<div class="stat"><div class="stat-label">Red 20-39</div><div class="stat-value sr">${d.summary.red}</div></div>` +
      `<div class="stat"><div class="stat-label">Grey 0-19</div><div class="stat-value sgr">${d.summary.grey}</div></div>`;

    let html = '';
    for (const tier of ['green', 'yellow', 'orange', 'red', 'grey']) {
      const items = d.tiers[tier] || [];
      if (items.length === 0) continue;
      const cfg = TIER_CONFIG[tier];
      html += renderSection(tier, cfg, items);
    }
    if (!html) html = '<div class="loading">No restock flags found.</div>';
    document.getElementById('content').innerHTML = html;
  } catch (e) {
    document.getElementById('content').innerHTML = '<div class="loading">Error: ' + e.message + '</div>';
  }
}

function renderSection(tier, cfg, items) {
  let h = `<div class="section">
    <div class="section-header ${cfg.header}">
      <span>${cfg.icon} ${cfg.label} (${items.length})</span>
      <span style="font-size:9px;color:var(--text-muted)">Score ${tier === 'green' ? '80-100' : tier === 'yellow' ? '60-79' : tier === 'orange' ? '40-59' : tier === 'red' ? '20-39' : '0-19'}</span>
    </div>
    <table><tr>
      <th>Score</th><th>Part Type</th><th>Vehicle</th><th>Part #s</th><th>Spec</th>
      <th>Sold</th><th>Stock</th><th>Avg $</th><th>Profit</th><th>Rev</th>
    </tr>`;
  for (const i of items) {
    const profitClass = i.profit >= 0 ? 'profit-pos' : 'profit-neg';
    const pns = (i.partNumbers || []).join(', ') || '—';
    h += `<tr>
      <td><span class="badge ${cfg.badge}">${i.score}</span></td>
      <td style="font-weight:600">${i.partType}</td>
      <td>${i.vehicle || '—'}</td>
      <td class="mono" style="max-width:120px;overflow:hidden;text-overflow:ellipsis" title="${pns}">${pns}</td>
      <td class="mono">${i.specificity || '—'}</td>
      <td style="font-weight:600">${i.sold180d}</td>
      <td>${i.activeStock}</td>
      <td>$${i.avgPrice}</td>
      <td class="${profitClass}">$${i.profit}</td>
      <td>$${i.revenue180d.toLocaleString()}</td>
    </tr>`;
  }
  h += '</table></div>';
  return h;
}

load();
</script>
</body>
</html>
