<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PartHawk — Weekly Restock Report</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#ffffff;color:#1a1a1a;min-height:100vh}
  header{background:#fff;border-bottom:1px solid #e5e7eb;padding:14px 20px;display:flex;align-items:center;justify-content:space-between}
  header h1{font-size:18px;font-weight:700;letter-spacing:-0.03em;color:#111}
  header .sub{font-size:11px;color:#6b7280;margin-top:1px}
  .nav{font-size:12px;display:flex;gap:12px}
  .nav a{color:#6b7280;text-decoration:none}.nav a:hover{color:#111}
  .summary{display:flex;gap:8px;padding:12px 20px;flex-wrap:wrap}
  .stat{background:#fff;border:1px solid #e5e7eb;border-radius:6px;padding:8px 12px;min-width:80px}
  .stat-label{font-size:9px;font-weight:600;color:#9ca3af;text-transform:uppercase;letter-spacing:0.06em}
  .stat-value{font-size:18px;font-weight:800;margin-top:1px}
  .sg{color:#16a34a}.sy{color:#ca8a04}.so{color:#ea580c}.sr{color:#dc2626}.sgr{color:#9ca3af}
  .section{padding:0 20px 12px}
  .section-header{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;padding:8px 0;border-bottom:1px solid #e5e7eb;margin-bottom:4px;display:flex;justify-content:space-between}
  .sh-green{color:#16a34a}.sh-yellow{color:#ca8a04}.sh-orange{color:#ea580c}.sh-red{color:#dc2626}.sh-grey{color:#9ca3af}
  table{width:100%;border-collapse:collapse;font-size:11px}
  th{text-align:left;padding:4px 6px;color:#9ca3af;font-weight:600;font-size:9px;text-transform:uppercase;letter-spacing:0.05em;border-bottom:1px solid #e5e7eb}
  td{padding:5px 6px;border-bottom:1px solid #f3f4f6;color:#374151}
  tr:hover td{background:#f9fafb}
  .badge{font-size:9px;font-weight:700;padding:2px 5px;border-radius:3px;white-space:nowrap}
  .b-green{background:#dcfce7;color:#16a34a}.b-yellow{background:#fef9c3;color:#a16207}.b-orange{background:#ffedd5;color:#c2410c}.b-red{background:#fee2e2;color:#dc2626}.b-grey{background:#f3f4f6;color:#9ca3af}
  .mono{font-family:monospace;font-size:10px}
  .profit-pos{color:#16a34a}.profit-neg{color:#dc2626}
  .sold-out{color:#dc2626;font-size:10px;font-weight:600}
  .loading{text-align:center;padding:40px;color:#9ca3af}
  .spinner{width:24px;height:24px;border:2px solid #e5e7eb;border-top-color:#16a34a;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 10px}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<header>
  <div>
    <h1>Weekly Restock Report</h1>
    <div class="sub" id="sub">Loading...</div>
  </div>
  <div class="nav">
    <a href="/">Home</a>
    <a href="/item/search">Search</a>
    <a href="/intelligence/price-check">Price Check</a>
    <a href="/intelligence/stale-inventory">Stale Inv</a>
    <a href="/intelligence/your-sales">Sales</a>
    <a href="/admin/pull">Attack List</a>
    <a href="/admin/restock" style="color:#111;font-weight:700;">Restock</a>
    <a href="/admin/gate">Gate Calc</a>
    <a href="/admin/vin">VIN Scanner</a>
  </div>
</header>
<div class="summary" id="summary"></div>
<div id="content"><div class="loading"><div class="spinner"></div>Generating report...</div></div>
<script>
const TIER_CONFIG = {
  green:  { icon: '🟢', label: 'RESTOCK NOW',  badge: 'b-green',  header: 'sh-green' },
  yellow: { icon: '🟡', label: 'STRONG BUY',   badge: 'b-yellow', header: 'sh-yellow' },
  orange: { icon: '🟠', label: 'CONSIDER',     badge: 'b-orange', header: 'sh-orange' },
};

function formatSoldOut(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr);
  const now = new Date();
  const diffDays = Math.floor((now - d) / 86400000);
  if (diffDays <= 1) return 'Today';
  if (diffDays <= 7) return diffDays + 'd ago';
  if (diffDays <= 30) return Math.floor(diffDays / 7) + 'w ago';
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

async function load() {
  try {
    const res = await fetch('/restock/report');
    const d = await res.json();
    if (!d.success) throw new Error(d.error);

    const date = new Date(d.generatedAt).toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
    document.getElementById('sub').textContent = date + ' — ' + d.summary.total + ' part groups scored';

    document.getElementById('summary').innerHTML =
      `<div class="stat"><div class="stat-label">Restock Now</div><div class="stat-value sg">${d.summary.green}</div></div>` +
      `<div class="stat"><div class="stat-label">Strong Buy</div><div class="stat-value sy">${d.summary.yellow}</div></div>` +
      `<div class="stat"><div class="stat-label">Consider</div><div class="stat-value so">${d.summary.orange}</div></div>` +
      `<div class="stat"><div class="stat-label">Total</div><div class="stat-value">${d.summary.total}</div></div>`;

    let html = '';
    for (const tier of ['green', 'yellow', 'orange']) {
      const items = d.tiers[tier] || [];
      if (items.length === 0) continue;
      const cfg = TIER_CONFIG[tier];
      html += renderSection(tier, cfg, items);
    }
    if (!html) html = '<div class="loading">No restock flags found.</div>';
    document.getElementById('content').innerHTML = html;
  } catch (e) {
    document.getElementById('content').innerHTML = '<div class="loading">Error: ' + e.message + '</div>';
  }
}

function renderSection(tier, cfg, items) {
  let h = `<div class="section">
    <div class="section-header ${cfg.header}">
      <span>${cfg.icon} ${cfg.label} (${items.length})</span>
      <span style="font-size:9px;color:#9ca3af">Score ${tier === 'green' ? '80+' : tier === 'yellow' ? '60-79' : '40-59'}</span>
    </div>
    <table><tr>
      <th>Score</th><th>Make</th><th>Part Type</th>
      <th>Sold 180d</th><th>Sold 90d</th><th>Stock</th><th>Avg $</th><th>Last Sold</th><th>Total Rev</th>
    </tr>`;
  for (const i of items) {
    const lastSold = i.daysSinceSold != null ? (i.daysSinceSold <= 1 ? 'Today' : i.daysSinceSold + 'd ago') : '—';
    h += `<tr>
      <td><span class="badge ${cfg.badge}">${i.score}</span></td>
      <td style="font-weight:600">${i.vehicle || i.make}</td>
      <td style="font-weight:600">${i.partType}</td>
      <td>${i.sold180d}</td>
      <td style="font-weight:600">${i.sold90d}</td>
      <td>${i.activeStock}</td>
      <td>$${i.avgPrice}</td>
      <td>${lastSold}</td>
      <td>$${Math.round(i.revenue180d).toLocaleString()}</td>
    </tr>`;
  }
  h += '</table></div>';
  return h;
}

load();
</script>
</body>
</html>
