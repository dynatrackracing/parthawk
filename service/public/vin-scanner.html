<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0a0a">
<title>PartHawk — VIN Scanner</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0a; --surface: #141414; --surface2: #1c1c1c;
    --border: #2a2a2a; --red: #ef4444; --green: #22c55e;
    --yellow: #eab308; --orange: #f97316;
    --text: #f9fafb; --text-mid: #d1d5db; --text-muted: #6b7280;
    --font: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
  }
  body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; }
  header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; }
  header h1 { font-size: 18px; font-weight: 700; letter-spacing: -0.03em; }
  header .sub { font-size: 11px; color: var(--text-muted); margin-top: 1px; }
  nav { display: flex; gap: 6px; padding: 6px 14px; background: var(--surface); border-bottom: 1px solid var(--border); overflow-x: auto; scrollbar-width: none; font-size: 11px; }
  nav::-webkit-scrollbar { display: none; }
  nav a { color: var(--text-muted); text-decoration: none; padding: 4px 8px; border-radius: 4px; white-space: nowrap; background: var(--surface2); }
  nav a.active { color: var(--red); font-weight: 700; }
  .container { padding: 16px; max-width: 600px; margin: 0 auto; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px; margin-bottom: 12px; }
  .card-title { font-size: 10px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 10px; }
  .vin-input-row { display: flex; gap: 8px; }
  .vin-input {
    flex: 1; padding: 12px 14px; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-size: 18px; font-family: monospace;
    font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; outline: none;
  }
  .vin-input:focus { border-color: var(--red); }
  .vin-input::placeholder { color: var(--text-muted); font-size: 14px; letter-spacing: 0; font-weight: 400; }
  .btn { padding: 12px 18px; border-radius: 8px; border: none; font-size: 14px; font-weight: 700; cursor: pointer; }
  .btn-red { background: var(--red); color: white; }
  .btn-red:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-surface { background: var(--surface2); border: 1px solid var(--border); color: var(--text-mid); font-size: 20px; }
  .btn-row { display: flex; gap: 8px; margin-top: 10px; }
  .spinner { width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--red); border-radius: 50%; animation: spin 0.8s linear infinite; display: inline-block; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Vehicle info card */
  .vehicle-header { font-size: 20px; font-weight: 800; letter-spacing: -0.03em; margin-bottom: 4px; }
  .vehicle-sub { font-size: 12px; color: var(--text-muted); }
  .badge-row { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
  .badge { font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 4px; text-transform: uppercase; }
  .badge-green { background: #064e3b; color: var(--green); }
  .badge-yellow { background: #713f12; color: var(--yellow); }
  .badge-orange { background: #7c2d12; color: var(--orange); }
  .badge-red { background: #7f1d1d; color: var(--red); }
  .badge-gray { background: #1f2937; color: var(--text-muted); }
  .badge-blue { background: #1e3a5f; color: #60a5fa; }

  /* Parts table */
  .parts-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .parts-table th { text-align: left; padding: 6px 8px; color: var(--text-muted); font-size: 10px; font-weight: 600; text-transform: uppercase; border-bottom: 1px solid var(--border); }
  .parts-table td { padding: 8px; border-bottom: 1px solid var(--border); }
  .parts-table tr:hover td { background: var(--surface2); }
  .total-row { font-weight: 800; font-size: 14px; }
  .price-green { color: var(--green); font-weight: 700; }
  .price-yellow { color: var(--yellow); font-weight: 700; }
  .price-orange { color: var(--orange); font-weight: 700; }
  .price-red { color: var(--red); font-weight: 700; }

  /* History */
  .history-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); cursor: pointer; }
  .history-row:hover { background: var(--surface2); }
  .history-vin { font-family: monospace; font-size: 12px; font-weight: 700; }
  .history-vehicle { font-size: 11px; color: var(--text-mid); }
  .history-time { font-size: 10px; color: var(--text-muted); }

  /* Yard match */
  .yard-match { background: #064e3b; border: 1px solid #065f46; border-radius: 8px; padding: 10px 14px; margin-top: 8px; }
  .yard-match-title { font-size: 12px; font-weight: 700; color: var(--green); }
  .yard-match-sub { font-size: 11px; color: #6ee7b7; margin-top: 2px; }

  .prog-note { font-size: 10px; color: var(--yellow); margin-top: 2px; }

  /* Camera */
  .camera-input { display: none; }
</style>
</head>
<body>

<header>
  <div>
    <h1>VIN Scanner</h1>
    <div class="sub">Scan or enter a VIN for instant parts intelligence</div>
  </div>
</header>
<nav>
  <a href="/">Home</a>
  <a href="/item/search">Search</a>
  <a href="/intelligence/price-check">Price Check</a>
  <a href="/intelligence/stale-inventory">Stale Inv</a>
  <a href="/intelligence/your-sales">Sales</a>
  <a href="/admin/pull">Attack List</a>
  <a href="/admin/restock">Restock</a>
  <a href="/admin/gate">Gate Calc</a>
  <a href="/admin/vin" class="active">VIN Scanner</a>
</nav>

<div class="container">
  <!-- Input Card -->
  <div class="card">
    <div class="card-title">Enter or Scan VIN</div>
    <div class="vin-input-row">
      <input type="text" class="vin-input" id="vinInput" maxlength="17" placeholder="Enter 17-char VIN" autocomplete="off" spellcheck="false">
      <button class="btn btn-surface" onclick="openCamera()" title="Camera">📷</button>
    </div>
    <div class="btn-row">
      <button class="btn btn-red" id="decodeBtn" onclick="decodeVin()" style="flex:1;">Decode</button>
    </div>
    <input type="file" accept="image/*" capture="environment" id="cameraInput" class="camera-input" onchange="handlePhoto(event)">
  </div>

  <!-- Results -->
  <div id="results"></div>

  <!-- History -->
  <div class="card" id="historyCard">
    <div class="card-title">Recent Scans</div>
    <div id="historyList" style="max-height:300px;overflow-y:auto;">
      <div style="color:var(--text-muted);font-size:12px;">Loading...</div>
    </div>
  </div>
</div>

<script>
  // Auto-focus
  document.getElementById('vinInput').focus();

  // Enter key triggers decode
  document.getElementById('vinInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') decodeVin();
  });

  function openCamera() {
    document.getElementById('cameraInput').click();
  }

  // Resize image before upload to prevent mobile crashes
  function resizeImage(file, maxWidth) {
    return new Promise((resolve, reject) => {
      const img = new Image();
      const url = URL.createObjectURL(file);
      img.onload = () => {
        URL.revokeObjectURL(url);
        const scale = Math.min(1, maxWidth / img.width);
        const canvas = document.createElement('canvas');
        canvas.width = Math.round(img.width * scale);
        canvas.height = Math.round(img.height * scale);
        canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
        canvas.toBlob(blob => blob ? resolve(blob) : reject(new Error('Resize failed')), 'image/jpeg', 0.8);
      };
      img.onerror = () => { URL.revokeObjectURL(url); reject(new Error('Image load failed')); };
      img.src = url;
    });
  }

  async function handlePhoto(evt) {
    const file = evt.target.files[0];
    if (!file) return;

    document.getElementById('results').innerHTML = '<div class="card"><div style="text-align:center;padding:20px;"><div class="spinner"></div><div style="margin-top:8px;color:var(--text-muted);font-size:12px;">Reading VIN from photo...</div></div></div>';

    try {
      const resized = await resizeImage(file, 1024);
      const formData = new FormData();
      formData.append('photo', resized, 'vin.jpg');

      const res = await fetch('/vin/decode-photo', { method: 'POST', body: formData });
      const data = await res.json();

      if (!data.success || data.vin === 'UNREADABLE') {
        document.getElementById('results').innerHTML = '<div class="card" style="text-align:center;"><div style="color:var(--red);font-size:14px;font-weight:600;">Could not read VIN from photo</div><div style="color:var(--text-muted);font-size:12px;margin-top:4px;">Try again with better lighting, or type manually.</div></div>';
        return;
      }

      // Put the VIN in the input and auto-decode
      document.getElementById('vinInput').value = data.vin;
      decodeVin('camera');
    } catch (err) {
      document.getElementById('results').innerHTML = `<div class="card" style="color:var(--red);">Error: ${err.message}</div>`;
    }
    evt.target.value = '';
  }

  async function decodeVin(source) {
    const vin = document.getElementById('vinInput').value.trim().toUpperCase().replace(/[^A-HJ-NPR-Z0-9]/g, '');
    if (vin.length < 11) {
      document.getElementById('results').innerHTML = '<div class="card" style="color:var(--red);font-size:13px;">Enter at least 11 characters</div>';
      return;
    }

    const btn = document.getElementById('decodeBtn');
    btn.disabled = true;
    btn.innerHTML = '<div class="spinner" style="margin:0 auto;"></div>';
    document.getElementById('results').innerHTML = '<div class="card"><div style="text-align:center;padding:20px;"><div class="spinner"></div><div style="margin-top:8px;color:var(--text-muted);font-size:12px;">Decoding VIN & loading parts intelligence...</div></div></div>';

    try {
      const res = await fetch('/vin/scan', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ vin, source: source || 'manual' }),
      });
      const data = await res.json();

      if (!data.success) throw new Error(data.error);

      renderResults(data);
      loadHistory(); // Refresh history
    } catch (err) {
      document.getElementById('results').innerHTML = `<div class="card" style="color:var(--red);">Error: ${err.message}</div>`;
    }

    btn.disabled = false;
    btn.textContent = 'Decode';
  }

  function renderResults(data) {
    const d = data.decoded;
    const parts = data.partsIntel || [];
    let html = '';

    // Vehicle info card
    const titleParts = [d.year, d.make, d.model, d.trim].filter(Boolean);
    html += `<div class="card">
      <div class="vehicle-header">${titleParts.join(' ')}</div>
      <div class="vehicle-sub" style="font-family:monospace;font-size:14px;color:var(--green);margin-bottom:6px;">${data.vin}</div>
      <div class="badge-row">
        ${d.engine ? `<span class="badge badge-gray">${d.engine}</span>` : ''}
        ${d.engineType ? `<span class="badge ${d.engineType === 'Gas' ? 'badge-gray' : d.engineType === 'Hybrid' ? 'badge-yellow' : d.engineType === 'Diesel' ? 'badge-orange' : 'badge-blue'}">${d.engineType}</span>` : ''}
        ${d.drivetrain ? `<span class="badge badge-blue">${d.drivetrain}</span>` : ''}
        ${d.bodyStyle ? `<span class="badge badge-gray">${d.bodyStyle}</span>` : ''}
      </div>
      <div style="margin-top:8px;font-size:11px;color:var(--text-muted);display:flex;gap:12px;flex-wrap:wrap;">
        ${d.plantCity ? `<span>Plant: ${d.plantCity}</span>` : ''}
        ${d.plantCountry ? `<span>Country: ${d.plantCountry}</span>` : ''}
      </div>`;

    // Yard match
    if (data.yardMatch) {
      html += `<div class="yard-match">
        <div class="yard-match-title">Found in yard inventory</div>
        <div class="yard-match-sub">${data.yardMatch.yardName}${data.yardMatch.row ? ' — Row ' + data.yardMatch.row : ''}${data.yardMatch.color ? ' — ' + data.yardMatch.color : ''}</div>
      </div>`;
    }

    html += '</div>';

    // Parts intelligence
    if (parts.length > 0) {
      html += `<div class="card">
        <div class="card-title">Parts Intelligence — ${parts.length} part types found</div>
        <table class="parts-table">
          <tr><th>Part</th><th>Sold</th><th>Avg $</th><th>Stock</th><th>Source</th></tr>`;

      for (const p of parts) {
        const priceClass = p.avgPrice >= 300 ? 'price-green' : p.avgPrice >= 200 ? 'price-yellow' : p.avgPrice >= 100 ? 'price-orange' : 'price-red';
        const stockInfo = p.competitorCount ? `${p.competitorCount} listed` : '—';
        const sourceLabel = p.sold > 0 ? `You sold ${p.sold}x` : (p.source || 'Competitor');
        html += `<tr>
          <td style="font-weight:600;">${p.partType}${p.programmingRequired ? ' <span style="color:var(--yellow);font-size:9px;">PROG</span>' : ''}</td>
          <td>${p.sold || '—'}</td>
          <td class="${priceClass}">$${p.avgPrice}</td>
          <td style="font-size:11px;color:var(--text-muted);">${stockInfo}</td>
          <td style="font-size:10px;color:var(--text-muted);">${sourceLabel}</td>
        </tr>`;
        if (p.programmingNote) {
          html += `<tr><td colspan="5" class="prog-note" style="padding:2px 8px 6px;">Programming: ${p.programmingNote}${p.programmingTool ? ' (' + p.programmingTool + ')' : ''}</td></tr>`;
        }
      }

      html += `<tr class="total-row"><td>TOTAL VALUE</td><td></td><td class="price-green">$${data.totalValue}</td><td></td><td></td></tr>`;
      html += '</table></div>';
    } else {
      html += '<div class="card"><div style="text-align:center;color:var(--text-muted);font-size:13px;padding:12px;">No parts intelligence found for this vehicle. The Auto/Item tables may not have matches for this year/make/model.</div></div>';
    }

    document.getElementById('results').innerHTML = html;
  }

  // History
  async function loadHistory() {
    try {
      const res = await fetch('/vin/history?limit=30');
      const data = await res.json();
      if (!data.success || !data.scans.length) {
        document.getElementById('historyList').innerHTML = '<div style="color:var(--text-muted);font-size:12px;">No scans yet.</div>';
        return;
      }

      let html = '';
      for (const s of data.scans) {
        const vehicle = [s.year, s.make, s.model, s.trim].filter(Boolean).join(' ');
        const ago = timeAgo(s.scanned_at);
        html += `<div class="history-row" onclick="document.getElementById('vinInput').value='${s.vin}';decodeVin();">
          <div>
            <div class="history-vin">${s.vin}</div>
            <div class="history-vehicle">${vehicle || 'Unknown'}</div>
          </div>
          <div style="text-align:right;">
            <div class="history-time">${ago}</div>
            <div style="font-size:10px;color:var(--text-muted);">${s.source || 'manual'}</div>
          </div>
        </div>`;
      }
      document.getElementById('historyList').innerHTML = html;
    } catch (e) {
      document.getElementById('historyList').innerHTML = '<div style="color:var(--text-muted);font-size:12px;">Could not load history.</div>';
    }
  }

  function timeAgo(ds) {
    const d = new Date(ds);
    const diff = Date.now() - d.getTime();
    const m = Math.floor(diff / 60000);
    if (m < 1) return 'just now';
    if (m < 60) return m + 'm ago';
    const h = Math.floor(m / 60);
    if (h < 24) return h + 'h ago';
    const dd = Math.floor(h / 24);
    return dd + 'd ago';
  }

  // Boot
  loadHistory();
</script>
</body>
</html>
