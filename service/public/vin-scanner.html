<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#ffffff">
<title>PartHawk — VIN Scanner</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#fff;color:#1a1a1a;min-height:100vh}
  header{background:#fff;border-bottom:1px solid #e5e7eb;padding:14px 16px}
  header h1{font-size:18px;font-weight:700;letter-spacing:-0.03em}
  header .sub{font-size:11px;color:#6b7280;margin-top:1px}
  .nav{display:flex;gap:6px;padding:6px 14px;background:#fff;border-bottom:1px solid #e5e7eb;overflow-x:auto;scrollbar-width:none;font-size:11px}
  .nav::-webkit-scrollbar{display:none}
  .nav a{color:#6b7280;text-decoration:none;padding:4px 8px;border-radius:4px;white-space:nowrap;background:#f9fafb}
  .nav a.active{color:#dc2626;font-weight:700;background:#fef2f2}
  .container{padding:12px;max-width:600px;margin:0 auto}
  .card{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:14px;margin-bottom:10px}
  .card-title{font-size:10px;font-weight:700;color:#9ca3af;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:8px}
  .vin-row{display:flex;gap:8px}
  .vin-input{flex:1;padding:10px 12px;border:1px solid #d1d5db;border-radius:8px;font-size:17px;font-family:monospace;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;outline:none;background:#f9fafb}
  .vin-input:focus{border-color:#dc2626}
  .vin-input::placeholder{color:#9ca3af;font-size:13px;letter-spacing:0;font-weight:400}
  .btn{padding:10px 16px;border-radius:8px;border:none;font-size:13px;font-weight:700;cursor:pointer}
  .btn-red{background:#dc2626;color:#fff}
  .btn-red:disabled{opacity:.4}
  .btn-cam{background:#f3f4f6;border:1px solid #d1d5db;font-size:18px;color:#374151}
  .btn-row{display:flex;gap:8px;margin-top:8px}
  .spinner{width:18px;height:18px;border:2px solid #e5e7eb;border-top-color:#dc2626;border-radius:50%;animation:spin .7s linear infinite;display:inline-block}
  @keyframes spin{to{transform:rotate(360deg)}}
  /* Vehicle */
  .vh{font-size:18px;font-weight:800;letter-spacing:-0.02em;margin-bottom:2px}
  .vin-str{font-family:monospace;font-size:13px;color:#16a34a;font-weight:700;margin-bottom:6px}
  .badges{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:6px}
  .b{font-size:9px;font-weight:700;padding:2px 7px;border-radius:4px;text-transform:uppercase}
  .b-gr{background:#dcfce7;color:#16a34a}.b-yl{background:#fef9c3;color:#a16207}.b-or{background:#ffedd5;color:#c2410c}.b-rd{background:#fee2e2;color:#dc2626}.b-gy{background:#f3f4f6;color:#6b7280}.b-bl{background:#dbeafe;color:#2563eb}
  .yard-match{background:#dcfce7;border:1px solid #bbf7d0;border-radius:8px;padding:8px 12px;margin-top:6px}
  .yard-match b{color:#16a34a}
  /* Tables */
  table{width:100%;border-collapse:collapse;font-size:12px}
  th{text-align:left;padding:5px 6px;color:#9ca3af;font-size:9px;font-weight:600;text-transform:uppercase;border-bottom:1px solid #e5e7eb}
  td{padding:6px;border-bottom:1px solid #f3f4f6}
  tr:hover td{background:#f9fafb}
  .pg{color:#16a34a;font-weight:700}.py{color:#ca8a04;font-weight:700}.po{color:#ea580c;font-weight:700}.pr{color:#dc2626;font-weight:700}
  .total-row td{font-weight:800;font-size:13px;border-top:2px solid #e5e7eb}
  .section-empty{color:#9ca3af;font-size:12px;padding:10px 0;text-align:center}
  /* History */
  .h-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #f3f4f6;cursor:pointer}
  .h-row:hover{background:#f9fafb}
  .h-vin{font-family:monospace;font-size:11px;font-weight:700}
  .h-veh{font-size:10px;color:#6b7280}
  .h-time{font-size:10px;color:#9ca3af}
  .camera-input{display:none}
</style>
</head>
<body>
<header>
  <h1>VIN Scanner</h1>
  <div class="sub">Scan or enter a VIN for instant parts intelligence</div>
</header>
<div class="nav">
  <a href="/">Home</a><a href="/item/search">Search</a><a href="/intelligence/price-check">Price Check</a>
  <a href="/intelligence/your-sales">Sales</a><a href="/admin/pull">Attack List</a>
  <a href="/admin/restock">Restock</a><a href="/admin/gate">Gate Calc</a>
  <a href="/admin/vin" class="active">VIN Scanner</a>
</div>
<div class="container">
  <div class="card">
    <div class="card-title">Enter or Scan VIN</div>
    <div class="vin-row">
      <input type="text" class="vin-input" id="vinInput" maxlength="17" placeholder="17-character VIN" autocomplete="off" spellcheck="false">
      <button class="btn btn-cam" onclick="document.getElementById('ci').click()" title="Camera">📷</button>
    </div>
    <div class="btn-row">
      <button class="btn btn-red" id="decodeBtn" onclick="doScan()" style="flex:1">Decode</button>
    </div>
    <div style="font-size:10px;color:#9ca3af;margin-top:6px;line-height:1.4">Tip: If dash VIN has glare, check the driver door jamb sticker or engine bay stamp</div>
    <input type="file" accept="image/*" capture="environment" id="ci" class="camera-input" onchange="handlePhoto(event)">
  </div>
  <div id="results"></div>
  <div class="card" id="historyCard">
    <div class="card-title">Recent Scans</div>
    <div id="historyList"><div class="section-empty">Loading...</div></div>
  </div>
</div>
<script>
document.getElementById('vinInput').focus();
document.getElementById('vinInput').addEventListener('keydown',e=>{if(e.key==='Enter')doScan()});

// Camera: capture photo, resize+grayscale+contrast, send base64 to server
async function handlePhoto(e){
  const file=e.target.files[0];
  if(!file)return;
  document.getElementById('results').innerHTML='<div class="card" style="text-align:center;padding:16px"><div class="spinner"></div><div style="margin-top:6px;color:#9ca3af;font-size:12px">Reading VIN from photo...</div></div>';

  const img=new Image();
  img.onload=async()=>{
    // Resize to max 1024px
    const maxW=1024;
    const scale=Math.min(1,maxW/img.width);
    const canvas=document.createElement('canvas');
    canvas.width=Math.round(img.width*scale);
    canvas.height=Math.round(img.height*scale);
    const ctx=canvas.getContext('2d');
    ctx.drawImage(img,0,0,canvas.width,canvas.height);

    // Grayscale + contrast boost (helps in junkyard conditions)
    const imageData=ctx.getImageData(0,0,canvas.width,canvas.height);
    const data=imageData.data;
    for(let i=0;i<data.length;i+=4){
      const gray=0.299*data[i]+0.587*data[i+1]+0.114*data[i+2];
      const adjusted=Math.min(255,Math.max(0,((gray-128)*1.4)+128));
      data[i]=data[i+1]=data[i+2]=adjusted;
    }
    ctx.putImageData(imageData,0,0);

    // Get base64
    const base64=canvas.toDataURL('image/jpeg',0.85).split(',')[1];
    console.log('VIN photo: '+canvas.width+'x'+canvas.height+', base64: '+base64.length+' chars');

    // Send to server
    try{
      const res=await fetch('/vin/decode-photo',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({image:base64})
      });
      const d=await res.json();

      if(d.vin&&d.vin!=='UNREADABLE'&&d.vin.length>=14){
        if(d.partial){
          document.getElementById('vinInput').value=d.vin;
          document.getElementById('results').innerHTML='<div class="card" style="text-align:center"><div style="color:#ca8a04;font-weight:600">Partial VIN: '+d.vin+'</div><div style="color:#6b7280;font-size:12px;margin-top:4px">Fill in the ? characters, then tap Decode.</div></div>';
        }else{
          document.getElementById('vinInput').value=d.vin;
          doScan('camera');
        }
      }else{
        document.getElementById('results').innerHTML='<div class="card" style="text-align:center"><div style="color:#dc2626;font-weight:600">Could not read VIN</div><div style="color:#6b7280;font-size:12px;margin-top:4px">Try again — avoid glare, get closer, or try the door jamb sticker.</div><button class="btn btn-red" style="margin-top:8px" onclick="document.getElementById(\'ci\').click()">Retake</button></div>';
      }
    }catch(err){
      document.getElementById('results').innerHTML='<div class="card" style="color:#dc2626">Error: '+err.message+'</div>';
    }
  };
  img.src=URL.createObjectURL(file);
  e.target.value='';
}

async function doScan(src){
  const vin=document.getElementById('vinInput').value.trim().toUpperCase().replace(/[^A-HJ-NPR-Z0-9]/g,'');
  if(vin.length<11){document.getElementById('results').innerHTML='<div class="card" style="color:#dc2626;font-size:13px">Enter at least 11 characters</div>';return;}
  const btn=document.getElementById('decodeBtn');btn.disabled=true;btn.innerHTML='<div class="spinner" style="margin:0 auto"></div>';
  document.getElementById('results').innerHTML='<div class="card" style="text-align:center;padding:16px"><div class="spinner"></div><div style="margin-top:6px;color:#9ca3af;font-size:12px">Decoding & querying inventory...</div></div>';
  try{
    const r=await fetch('/vin/scan',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({vin,source:src||'manual'})});
    const data=await r.json();if(!data.success)throw new Error(data.error);
    render(data);loadHistory();
  }catch(err){document.getElementById('results').innerHTML='<div class="card" style="color:#dc2626">Error: '+err.message+'</div>';}
  btn.disabled=false;btn.textContent='Decode';
}

function verdict(v){return v>=250?'GREAT':v>=150?'GOOD':v>=100?'FAIR':'POOR'}
function vc(v){return v==='GREAT'?'b-gr':v==='GOOD'?'b-yl':v==='FAIR'?'b-or':'b-rd'}
function pc(v){return v>=250?'pg':v>=150?'py':v>=100?'po':'pr'}

function render(data){
  const d=data.decoded;const sh=data.salesHistory||[];const cs=data.currentStock||[];const mr=data.marketRef||[];
  let h='';

  // Vehicle header — matches attack list style
  const headline=[d.year,d.make,data.baseModel||d.model].filter(Boolean).join(' ');
  const specs=[d.engine,d.engineType&&d.engineType!=='Gas'?d.engineType:null,d.drivetrain,d.trim].filter(Boolean).join(' · ');
  h+='<div class="card">';
  h+='<div style="font-size:22px;font-weight:900;letter-spacing:-0.03em;color:#111">'+headline+'</div>';
  if(specs)h+='<div style="font-size:13px;font-weight:600;color:#374151;margin-top:2px">'+specs+'</div>';
  h+='<div style="font-family:monospace;font-size:13px;color:#16a34a;font-weight:700;margin-top:4px">'+data.vin+'</div>';
  if(data.yardMatch)h+='<div class="yard-match"><b>In Yard:</b> '+data.yardMatch.yardName+(data.yardMatch.row?' — Row '+data.yardMatch.row:'')+(data.yardMatch.color?' — '+data.yardMatch.color:'')+'</div>';
  h+='</div>';

  // PARTS TO PULL — attack list format
  // Merge sales data + market data into unified part list
  const partMap={};
  for(const s of sh){
    partMap[s.partType]={partType:s.partType,sold:s.sold,avgPrice:s.avgPrice,lastSold:s.lastSoldDate,sampleTitle:s.sampleTitle,inStock:0,marketPrice:0,pns:[],sellers:[],isRebuild:false};
  }
  for(const c of cs){
    if(partMap[c.partType])partMap[c.partType].inStock=c.inStock;
    else partMap[c.partType]={partType:c.partType,sold:0,avgPrice:0,lastSold:null,sampleTitle:null,inStock:c.inStock,marketPrice:c.avgPrice,pns:[],sellers:[],isRebuild:false};
  }
  const mrUsed=mr.filter(p=>!p.isRebuild);
  const mrRebuild=mr.filter(p=>p.isRebuild);
  for(const m of mrUsed){
    if(partMap[m.partType]){
      partMap[m.partType].marketPrice=m.avgPrice;
      partMap[m.partType].pns=m.partNumbers||[];
      partMap[m.partType].sellers=m.sellers||[];
      if(!partMap[m.partType].inStock)partMap[m.partType].inStock=m.inStock||0;
    }else{
      partMap[m.partType]={partType:m.partType,sold:m.yourSold||0,avgPrice:m.yourAvg||m.avgPrice,lastSold:null,sampleTitle:null,inStock:m.inStock||0,marketPrice:m.avgPrice,pns:m.partNumbers||[],sellers:m.sellers||[],isRebuild:false};
    }
  }

  const parts=Object.values(partMap).filter(p=>!p.isRebuild).sort((a,b)=>(b.avgPrice||b.marketPrice)-(a.avgPrice||a.marketPrice));
  let totalValue=0;

  h+='<div class="card"><div class="card-title">Parts to Pull</div>';
  if(parts.length>0){
    for(const p of parts){
      const price=p.avgPrice||p.marketPrice||0;
      const vd=verdict(price);
      const lastSold=p.lastSold?timeAgo(p.lastSold)+' ago':'—';
      const pn=p.pns&&p.pns[0]?p.pns[0]:'';
      const title=p.sampleTitle||p.partType;
      totalValue+=price;

      h+='<div style="padding:10px 0;border-bottom:1px solid #f3f4f6">';
      h+='<div style="display:flex;justify-content:space-between;align-items:flex-start">';
      h+='<div style="flex:1;min-width:0">';
      h+='<div style="display:flex;align-items:center;gap:6px"><span class="b '+vc(vd)+'">'+vd+'</span><span style="font-size:13px;font-weight:700;color:#111">['+p.partType+']</span><span class="'+pc(price)+'" style="font-size:13px;font-weight:700">$'+price+' avg</span></div>';
      h+='<div style="font-size:11px;color:#374151;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+title.substring(0,70)+'</div>';
      if(pn)h+='<div style="font-size:10px;color:#9ca3af;font-family:monospace;margin-top:1px">'+pn+'</div>';
      h+='<div style="font-size:10px;color:#6b7280;margin-top:2px">'+p.inStock+' in stock · '+p.sold+'x sold · Last sold '+lastSold+'</div>';
      h+='</div></div></div>';
    }
  }else{
    h+='<div class="section-empty">No parts data for this vehicle</div>';
  }
  h+='</div>';

  // Total value
  if(totalValue>0)h+='<div class="card" style="text-align:center"><div style="font-size:11px;color:#9ca3af;text-transform:uppercase;letter-spacing:0.06em">Estimated Pull Value</div><div style="font-size:28px;font-weight:800;color:#16a34a;margin-top:2px">$'+totalValue+'</div></div>';

  // Rebuild reference — one line per type
  if(mrRebuild.length>0){
    h+='<div class="card" style="opacity:0.6"><div class="card-title">Rebuild Reference</div>';
    for(const p of mrRebuild){
      const sellers=(p.sellers||[]).join(', ')||'pro-rebuild';
      const priceStr=p.priceRange||('$'+p.avgPrice);
      h+='<div style="display:flex;justify-content:space-between;padding:3px 0;font-size:11px;color:#9ca3af">';
      h+='<span>[REBUILD] '+sellers+' — '+p.partType+'</span><span>'+priceStr+(p.count>1?' ('+p.count+')':'')+'</span></div>';
    }
    h+='</div>';
  }

  // AI Research — for newer vehicles with sparse data
  if(data.aiResearch){
    h+='<div class="card" style="border-left:3px solid #8b5cf6">';
    h+='<div style="display:flex;align-items:center;gap:6px;margin-bottom:8px">';
    h+='<span style="font-size:9px;font-weight:700;padding:2px 6px;border-radius:3px;background:#ede9fe;color:#7c3aed;text-transform:uppercase">AI Research</span>';
    h+='<span style="font-size:10px;color:#9ca3af">Market intelligence for '+[d.year,d.make,data.baseModel||d.model].filter(Boolean).join(' ')+'</span>';
    h+='</div>';
    h+='<div style="font-size:12px;color:#374151;line-height:1.6;white-space:pre-line">'+data.aiResearch+'</div>';
    h+='</div>';
  }

  // Sales history — collapsible
  if(sh.length>0){
    h+='<div class="card"><details><summary style="cursor:pointer;font-size:10px;font-weight:700;color:#9ca3af;text-transform:uppercase;letter-spacing:0.06em">Sales History ('+sh.reduce((s,p)=>s+p.sold,0)+' sold all time)</summary>';
    h+='<table style="margin-top:8px"><tr><th>Part</th><th>Sold</th><th>Avg $</th><th>Last</th></tr>';
    for(const p of sh){
      h+='<tr><td style="font-weight:600">'+p.partType+'</td><td>'+p.sold+'x</td><td class="'+pc(p.avgPrice)+'">$'+p.avgPrice+'</td><td style="font-size:10px;color:#6b7280">'+(p.lastSoldDate?timeAgo(p.lastSoldDate):'—')+'</td></tr>';
    }
    h+='</table></details></div>';
  }

  document.getElementById('results').innerHTML=h;
}

async function loadHistory(){
  try{
    const r=await fetch('/vin/history?limit=20');const d=await r.json();
    if(!d.success||!d.scans||!d.scans.length){document.getElementById('historyList').innerHTML='<div class="section-empty">No scans yet</div>';return;}
    let h='';
    for(const s of d.scans){
      const v=[s.year,s.make,s.model].filter(Boolean).join(' ');
      h+='<div class="h-row" onclick="document.getElementById(\'vinInput\').value=\''+s.vin+'\';doScan()"><div><div class="h-vin">'+s.vin+'</div><div class="h-veh">'+(v||'Unknown')+'</div></div><div style="text-align:right"><div class="h-time">'+timeAgo(s.scanned_at)+'</div></div></div>';
    }
    document.getElementById('historyList').innerHTML=h;
  }catch(e){document.getElementById('historyList').innerHTML='<div class="section-empty">Could not load</div>';}
}

function timeAgo(ds){if(!ds)return'—';const d=new Date(ds),m=Math.floor((Date.now()-d.getTime())/60000);if(m<1)return'now';if(m<60)return m+'m';const h=Math.floor(m/60);if(h<24)return h+'h';return Math.floor(h/24)+'d';}

loadHistory();
</script>
</body>
</html>
