<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0a0a">
<title>DarkHawk — HAWK EYE</title>
<link rel="stylesheet" href="/admin/dh-parts.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#0a0a0a;color:#F0F0F0;min-height:100vh}
.container{padding:12px;max-width:600px;margin:0 auto}
.card{background:#141414;border:1px solid #2a2a2a;border-radius:10px;padding:14px;margin-bottom:10px}
.card-title{font-size:10px;font-weight:700;color:#6B7280;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:8px}
.vin-input{width:100%;padding:12px;border:1px solid #333;border-radius:8px;font-size:18px;font-family:monospace;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;outline:none;background:#141414;color:#F0F0F0}
.vin-input:focus{border-color:#dc2626}
.vin-input::placeholder{color:#6B7280;font-size:13px;letter-spacing:0;font-weight:400}
.btn-row{display:flex;gap:8px;margin-top:10px}
.btn{padding:12px 16px;border-radius:8px;border:none;font-size:14px;font-weight:700;cursor:pointer}
.btn-red{background:#dc2626;color:#fff;flex:1}
.btn-red:disabled{opacity:.4}
.btn-cam{background:#1a1a1a;border:1px solid #333;font-size:20px;color:#d1d5db;padding:12px 16px}
.spinner{width:18px;height:18px;border:2px solid #333;border-top-color:#dc2626;border-radius:50%;animation:spin .7s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse-gold{0%,100%{box-shadow:0 0 0 0 rgba(255,215,0,0.3)}50%{box-shadow:0 0 8px 2px rgba(255,215,0,0.3)}}
@keyframes pulse-purple{0%,100%{box-shadow:0 0 0 0 rgba(195,155,211,0.3)}50%{box-shadow:0 0 8px 2px rgba(195,155,211,0.3)}}
@keyframes pulse-fire{0%,100%{filter:brightness(1)}50%{filter:brightness(1.5)}}
.section-empty{color:#6B7280;font-size:12px;padding:10px 0;text-align:center}
.hist-link{display:block;text-align:center;padding:10px;font-size:11px;color:#6B7280;cursor:pointer;text-decoration:underline}
.h-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #1f1f1f;cursor:pointer}
.h-vin{font-family:monospace;font-size:11px;font-weight:700}
.h-veh{font-size:10px;color:#9CA3AF}
.h-time{font-size:10px;color:#6B7280}
/* Chip styles matching Daily Feed */
.chip{display:inline-block;font-size:9px;font-weight:700;padding:2px 7px;border-radius:4px;margin:1px 2px;white-space:nowrap}
.chip-gold{background:#3d2e0a;color:#FFD700;animation:pulse-gold 2s infinite}
.chip-purple{background:#2d1a3e;color:#C39BD3;animation:pulse-purple 2s infinite}
.chip-blue{background:#1a2a3d;color:#3498DB}
.chip-green{background:#0a2e0a;color:#2ECC40}
.chip-yellow{background:#3d2200;color:#FF8C00}
.chip-red{background:#3d0a0a;color:#FF4136}
.chip-gray{background:#1f2937;color:#6B7280}
/* Part detail */
.part-detail{padding:10px 0;border-bottom:1px solid #1f1f1f}
.part-detail.excluded{opacity:0.35}
.part-detail.spec-mismatch{opacity:0.4}
.pd-header{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.pd-title{font-size:12px;font-weight:600;color:#d1d5db;flex:1;min-width:0}
.pd-verdict{font-size:10px;font-weight:700;padding:3px 8px;border-radius:5px;white-space:nowrap;flex-shrink:0}
.pd-stats{display:flex;gap:10px;font-size:10px;color:#6B7280;margin-top:3px;flex-wrap:wrap}
.pd-reason{font-size:10px;color:#6B7280;font-style:italic;margin-top:2px}
.btn-pull{padding:6px 12px;border-radius:6px;border:1px solid #22c55e;background:transparent;color:#22c55e;font-size:10px;font-weight:700;cursor:pointer;margin-top:4px}
.btn-pull:disabled{opacity:0.4;cursor:default}
.btn-cached{border-color:#065f46;background:#064e3b;color:#22c55e}
.intel-fire{animation:pulse-fire 1.5s infinite}
/* Attribute badges */
.attr-badge{display:inline-block;font-size:8px;font-weight:700;padding:1px 5px;border-radius:3px;margin-right:3px;white-space:nowrap}
</style>
</head>
<body>
<div id="dh-nav"></div>
<script src="/admin/dh-nav.js?v=5"></script><script src="/admin/dh-parts.js?v=1"></script><script>dhNav('vin')</script>
<div class="container">
  <div class="card">
    <div class="card-title">Enter or Scan VIN</div>
    <input type="text" class="vin-input" id="vinInput" maxlength="17" placeholder="17-character VIN" autocomplete="off" spellcheck="false">
    <div class="btn-row">
      <button class="btn btn-cam" id="camBtn">&#x1F4F7;</button>
      <button class="btn btn-red" id="decBtn" onclick="doScan()">Decode</button>
    </div>
    <div style="font-size:10px;color:#6B7280;margin-top:6px">Tip: check door jamb sticker if dash has glare</div>
    <div id="status" style="font-size:11px;color:#9CA3AF;margin-top:4px"></div>
  </div>
  <div id="results"></div>
  <div id="histArea"><span class="hist-link" onclick="loadHistory(this)">Show Recent Scans</span></div>
</div>
<script>
function esc(s){if(!s)return '';var d=document.createElement('div');d.textContent=s;return d.innerHTML;}
var V=document.getElementById('vinInput');
V.focus();
V.addEventListener('keydown',function(e){if(e.key==='Enter')doScan()});
var _scanSeq=0;

// Camera photo processing
async function processVinPhoto(file) {
  try {
    var url = URL.createObjectURL(file);
    var img = new Image();
    await new Promise(function(resolve, reject) { img.onload = resolve; img.onerror = function() { reject(new Error('Failed to load image')); }; img.src = url; });
    var MAX_DIM = 1280;
    var w = img.naturalWidth, h = img.naturalHeight;
    if (w > MAX_DIM || h > MAX_DIM) {
      if (w > h) { h = Math.round(h * (MAX_DIM / w)); w = MAX_DIM; }
      else { w = Math.round(w * (MAX_DIM / h)); h = MAX_DIM; }
    }
    var canvas = document.createElement('canvas');
    canvas.width = w; canvas.height = h;
    var ctx = canvas.getContext('2d');
    ctx.drawImage(img, 0, 0, w, h);
    URL.revokeObjectURL(url); img.src = '';
    var b64 = canvas.toDataURL('image/jpeg', 0.7).split(',')[1];
    if (b64.length > 1500000) {
      canvas.width = Math.round(w * 0.5); canvas.height = Math.round(h * 0.5);
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      b64 = canvas.toDataURL('image/jpeg', 0.5).split(',')[1];
    }
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    canvas.width = 1; canvas.height = 1;
    return b64;
  } catch(err) {
    throw new Error('Could not process photo: ' + err.message);
  }
}

document.getElementById('camBtn').onclick=function(){
  var inp=document.createElement('input');
  inp.type='file';inp.accept='image/*';inp.capture='environment';
  inp.onchange=async function(e){
    var file=e.target.files[0];if(!file)return;
    document.getElementById('status').textContent='Reading VIN from photo...';
    document.getElementById('results').innerHTML='<div class="card" style="text-align:center;padding:16px"><div class="spinner"></div><div style="margin-top:6px;color:#6B7280;font-size:12px">Processing...</div></div>';
    try{
      var b64=await processVinPhoto(file);
      var r=await fetch('/vin/decode-photo',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({image:b64})}).then(function(r){return r.json()});
      b64=null;
      if(r.vin&&r.vin!=='UNREADABLE'&&r.vin.length>=11){
        V.value=r.vin;document.getElementById('status').textContent='VIN read: '+r.vin;doScan('camera');
      }else{
        document.getElementById('status').textContent='Could not read VIN. Try closer.';
        document.getElementById('results').innerHTML='<div class="card" style="text-align:center;color:#dc2626;font-weight:600">Could not read VIN<div style="color:#9CA3AF;font-size:12px;font-weight:400;margin-top:4px">Avoid glare, get closer, or try door jamb sticker.</div></div>';
      }
    }catch(err){
      document.getElementById('status').textContent='Error: '+err.message;
      document.getElementById('results').innerHTML='<div class="card" style="color:#dc2626">Error: '+err.message+'</div>';
    }
  };
  inp.click();
};

function doScan(src){
  var vin=V.value.trim().toUpperCase().replace(/[^A-HJ-NPR-Z0-9]/g,'');
  if(vin.length<11){document.getElementById('results').innerHTML='<div class="card" style="color:#dc2626;font-size:13px">Enter at least 11 characters</div>';return;}
  var mySeq=++_scanSeq;
  var btn=document.getElementById('decBtn');btn.disabled=true;btn.innerHTML='<div class="spinner" style="margin:0 auto"></div>';
  document.getElementById('results').innerHTML='<div class="card" style="text-align:center;padding:16px"><div class="spinner"></div><div style="margin-top:6px;color:#6B7280;font-size:12px">Decoding + scoring...</div></div>';
  fetch('/vin/scan-scored',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({vin:vin,source:src||'manual'})})
  .then(function(r){return r.json()})
  .then(function(data){if(mySeq!==_scanSeq)return;if(!data.success)throw new Error(data.error);render(data);})
  .catch(function(err){if(mySeq!==_scanSeq)return;document.getElementById('results').innerHTML='<div class="card" style="color:#dc2626">Error: '+err.message+'</div>';})
  .finally(function(){btn.disabled=false;btn.textContent='Decode';});
}

function ta(ds){if(!ds)return'-';var m=Math.floor((Date.now()-new Date(ds).getTime())/60000);if(m<1)return'now';if(m<60)return m+'m';var h=Math.floor(m/60);if(h<24)return h+'h';return Math.floor(h/24)+'d'}

function getScoreColor(s){
  if(s>=120)return '#FFD700';
  if(s>=100)return '#00FF00';
  if(s>=80)return '#2ECC40';
  if(s>=60)return '#F1C40F';
  if(s>=40)return '#FF8C00';
  return '#FF4136';
}

function tierColor(price,sources,overstock){
  if(overstock)return 'chip-red';
  if(sources&&sources.includes('mark'))return 'chip-gold';
  if(price>=500)return 'chip-gold';
  if(price>=350)return 'chip-purple';
  if(price>=250)return 'chip-blue';
  if(price>=150)return 'chip-green';
  if(price>=100)return 'chip-yellow';
  if(price>0)return 'chip-red';
  return 'chip-gray';
}

function verdictBadge(price,priceSource){
  if(!price||price<=0)return {label:'NO DATA',cls:'tier-nodata',text:'NO DATA'};
  var tier=getPartTier(price);
  var prefix='';var suffix='';
  if(priceSource==='item_reference')prefix='';
  else if(priceSource==='scout_alert')suffix=' (alert)';
  return {label:tier.label,cls:tier.cssClass,text:tier.label+' '+prefix+'$'+Math.round(price)+suffix};
}

function freshIcon(dateStr){
  if(!dateStr)return '';
  var d=Math.floor((Date.now()-new Date(dateStr).getTime())/86400000);
  if(d<=60)return ' &#x2705;';
  if(d<=90)return ' &#x26A0;&#xFE0F;';
  return ' &#x274C;';
}

function renderAttrBadges(v){
  var badges=[];
  var br=v.boostReasons||[];
  // Strict order per CLAUDE_RULES 39
  if(br.includes('ELECTRIC'))badges.push('<span class="attr-badge" style="border:1px solid #2979ff;color:#2979ff;background:transparent">EV</span>');
  if(br.includes('PHEV'))badges.push('<span class="attr-badge" style="border:1px solid #1de9b6;color:#1de9b6;background:transparent">PHEV</span>');
  if(v.trimBadge&&v.trimBadge.tier==='PERFORMANCE')badges.push('<span class="attr-badge" style="background:#3b82f6;color:#000">'+(v.trimBadge.decodedTrim?esc(v.trimBadge.decodedTrim):'PERFORMANCE')+'</span>');
  if(br.includes('HYBRID'))badges.push('<span class="attr-badge" style="border:1px solid #00bcd4;color:#00bcd4;background:transparent">HYBRID</span>');
  if(br.includes('DIESEL')||v.diesel)badges.push('<span class="attr-badge" style="background:#3b82f6;color:#000">DIESEL</span>');
  if(br.includes('4WD+MT'))badges.push('<span class="attr-badge" style="background:#16a34a;color:#000">'+(v.decoded_drivetrain==='AWD'?'AWD':'4WD')+'+MT</span>');
  else{
    if(v.trimBadge&&v.trimBadge.tier==='PREMIUM'&&!br.includes('PERFORMANCE'))badges.push('<span class="attr-badge" style="background:#22c55e;color:#000">'+(v.trimBadge.decodedTrim?esc(v.trimBadge.decodedTrim):'PREMIUM')+'</span>');
    var trans=(v.decoded_transmission||'').toUpperCase();
    if(/MANUAL|STANDARD/.test(trans)&&!br.includes('4WD+MT'))badges.push('<span class="attr-badge" style="background:#06b6d4;color:#000">MANUAL</span>');
    var dt=(v.decoded_drivetrain||v.drivetrain||'').toUpperCase();
    if(/4WD|4X4|AWD/.test(dt)&&!br.includes('4WD+MT'))badges.push('<span class="attr-badge" style="background:#eab308;color:#000">'+(dt.includes('AWD')?'AWD':'4WD')+'</span>');
    if(trans==='CHECK_MT')badges.push('<span class="attr-badge" style="background:#06b6d4;color:#000;opacity:0.6">CHECK MT</span>');
    if(/CVT/.test(trans))badges.push('<span class="attr-badge" style="background:#374151;color:#9ca3af;font-weight:500">CVT</span>');
  }
  if(v.trimBadge&&v.trimBadge.tier==='CHECK')badges.push('<span class="attr-badge" style="background:#ca8a04;color:#000">CHECK TRIM</span>');
  if(v.trimBadge&&v.trimBadge.tier==='BASE')badges.push('<span class="attr-badge" style="background:#374151;color:#9ca3af">BASE</span>');
  if(v.cult)badges.push('<span class="attr-badge" style="background:#d946ef;color:#000">CULT</span>');
  return badges.join('');
}

function renderChips(parts){
  if(!parts||parts.length===0)return '<span class="chip chip-gray">No data</span>';
  var seen={};var chips=[];
  for(var i=0;i<parts.length;i++){
    var p=parts[i];
    var pt=p.partType||'OTHER';
    if(seen[pt])continue;
    seen[pt]=true;
    if(p.isExcluded)continue;
    var price=p.displayPrice||p.price||0;
    var cls=tierColor(price,p.intelSources,p.overstockWarning);
    var icon=renderIntelIcon(p.intelSources||[]);
    if(!icon&&p.noveltyTier==='NOVEL')icon='<span style="color:#06b6d4;font-size:7px">&#x25CF;</span>';
    else if(!icon&&p.noveltyTier==='RESTOCK')icon='<span style="color:#22c55e;font-size:7px">&#x25CF;</span>';
    var priceStr=price>0?'$'+Math.round(price):'';
    chips.push('<span class="chip '+cls+'">'+icon+(icon?' ':'')+esc(pt)+(priceStr?' '+priceStr:'')+'</span>');
    if(chips.length>=6)break;
  }
  return chips.join('');
}

// Store last scan data for pull buttons
var _lastVin=null;var _lastYear=null;var _lastMake=null;var _lastModel=null;

function render(data){
  var v=data.vehicle;
  var parts=data.parts||[];
  if(!v){
    document.getElementById('results').innerHTML='<div class="card" style="color:#dc2626;font-size:13px">Could not decode VIN</div>';
    return;
  }
  _lastVin=data.vin;_lastYear=v.year;_lastMake=v.make;_lastModel=v.model;

  var h='';
  // === VEHICLE CARD (matches Daily Feed) ===
  var sc=getScoreColor(v.score);
  var scorePulse=v.score>=120?'animation:pulse-gold 2s infinite;':'';
  var valColor=v.est_value>=800?'#2ECC40':v.est_value>=500?'#F1C40F':v.est_value>=250?'#FF8C00':'#FF4136';

  h+='<div class="card">';
  h+='<div style="display:flex;gap:10px;align-items:flex-start">';
  // Score badge
  h+='<div style="min-width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;background:'+sc+'20;color:'+sc+';flex-shrink:0;'+scorePulse+'">'+v.score+'</div>';
  h+='<div style="flex:1;min-width:0">';
  // Line 1: YMM + engine + rarity + value
  h+='<div style="display:flex;justify-content:space-between;align-items:center;gap:8px">';
  h+='<div style="min-width:0">';
  h+='<div style="font-size:15px;font-weight:800;letter-spacing:-0.02em;color:#fff">'+v.year+' '+esc(v.make)+' '+esc(v.model)+'</div>';
  h+='</div>';
  if(v.est_value>0)h+='<div style="font-size:14px;font-weight:700;color:'+valColor+';flex-shrink:0">$'+v.est_value+'</div>';
  h+='</div>';
  // Engine + rarity inline
  var specs=[];
  if(v.engine)specs.push(v.engine);
  var specStr=specs.length>0?'<span style="font-size:12px;color:#9CA3AF;font-weight:600">'+esc(specs.join(' '))+'</span>':'';
  var rarityInline='';
  if(v.rarityTier&&v.rarityTier!=='NORMAL'&&v.rarityTier!=='COMMON'&&v.rarityTier!=='SATURATED'){
    var rtPulse=v.rarityPulses?(v.rarityTier==='LEGENDARY'?'animation:pulse-gold 2s infinite;':'animation:pulse-purple 2s infinite;'):'';
    var rtText=v.rarityTier==='LEGENDARY'?'#000':'#fff';
    var rtStar=v.rarityTier==='LEGENDARY'?'&#x2606; ':'';
    rarityInline=' <span class="chip" style="font-size:8px;font-weight:700;padding:1px 5px;background:'+v.rarityColor+';color:'+rtText+';'+rtPulse+'">'+rtStar+v.rarityTier+'</span>';
  }
  if(specStr||rarityInline)h+='<div style="margin-top:1px">'+specStr+rarityInline+'</div>';
  // Line 2: attribute badges
  var attrHtml=renderAttrBadges(v);
  if(attrHtml)h+='<div style="margin-top:3px">'+attrHtml+'</div>';
  // VIN display
  h+='<div style="font-family:monospace;font-size:11px;color:#16a34a;font-weight:700;margin-top:3px">'+data.vin+'</div>';
  // Vehicle specs row
  var specParts=[];
  if(v.trim)specParts.push(esc(v.trim));
  if(v.drivetrain)specParts.push(esc(v.drivetrain));
  if(v.transmission)specParts.push(esc(v.transmission)+(v.transSpeeds?' '+esc(v.transSpeeds)+'-spd':''));
  if(v.bodyStyle)specParts.push(esc(v.bodyStyle));
  if(specParts.length>0)h+='<div style="font-size:10px;color:#6B7280;margin-top:2px">'+specParts.join(' &middot; ')+'</div>';
  // Collapsed chips
  h+='<div style="margin-top:5px">'+renderChips(parts)+'</div>';
  h+='</div></div></div>';

  // === EXPANDED PARTS LIST ===
  var aboveFloor=[];var specMismatch=[];var belowFloor=[];var archiveParts=[];
  for(var i=0;i<parts.length;i++){
    var p=parts[i];
    if(p.isExcluded)continue;
    if(p.priceSource==='item_reference'){archiveParts.push(p);continue;}
    if(p.specMismatch){specMismatch.push(p);continue;}
    if(p.belowFloor){belowFloor.push(p);continue;}
    aboveFloor.push(p);
  }

  if(aboveFloor.length>0||archiveParts.length>0||specMismatch.length>0){
    h+='<div class="card"><div class="card-title">Parts Intelligence ('+parts.filter(function(p){return !p.isExcluded}).length+' parts)</div>';

    // Above-floor parts
    for(var i=0;i<aboveFloor.length;i++){
      h+=renderPartDetail(aboveFloor[i],data);
    }

    // Archives section
    if(archiveParts.length>0){
      h+='<div style="margin-top:8px"><details><summary style="cursor:pointer;font-size:9px;font-weight:700;color:#6B7280;text-transform:uppercase;letter-spacing:0.06em">Archives ('+archiveParts.length+')</summary>';
      for(var i=0;i<archiveParts.length;i++){
        h+=renderPartDetail(archiveParts[i],data);
      }
      h+='</details></div>';
    }

    // Spec mismatch section
    if(specMismatch.length>0){
      h+='<div style="margin-top:8px"><details><summary style="cursor:pointer;font-size:9px;font-weight:700;color:#6B7280;text-transform:uppercase;letter-spacing:0.06em">Spec Mismatch ('+specMismatch.length+')</summary>';
      for(var i=0;i<specMismatch.length;i++){
        h+='<div class="spec-mismatch">'+renderPartDetail(specMismatch[i],data)+'</div>';
      }
      h+='</details></div>';
    }

    // Below floor section
    if(belowFloor.length>0){
      h+='<div style="margin-top:8px"><details><summary style="cursor:pointer;font-size:9px;font-weight:700;color:#6B7280;text-transform:uppercase;letter-spacing:0.06em">Below Floor ('+belowFloor.length+')</summary>';
      for(var i=0;i<belowFloor.length;i++){
        h+='<div style="opacity:0.4">'+renderPartDetail(belowFloor[i],data)+'</div>';
      }
      h+='</details></div>';
    }

    h+='</div>';
  } else {
    h+='<div class="card"><div class="section-empty">No scored parts for this vehicle</div></div>';
  }

  // Rebuild reference
  if(data.rebuild_parts&&data.rebuild_parts.length>0){
    h+='<div class="card" style="opacity:0.5"><div class="card-title">Rebuild Reference</div>';
    data.rebuild_parts.forEach(function(rb){
      h+='<div style="display:flex;justify-content:space-between;padding:3px 0;font-size:11px;color:#6B7280"><span>[REBUILD] '+esc(rb.seller||'pro-rebuild')+' &mdash; '+esc(rb.partType)+'</span><span>'+esc(rb.priceRange||'$'+rb.price)+'</span></div>';
    });
    h+='</div>';
  }

  // Cached parts notice
  if(data.cachedParts&&data.cachedParts.length>0){
    h+='<div class="card" style="background:#422006;border:1px solid #92400e">';
    h+='<div style="color:#eab308;font-size:11px;font-weight:700;margin-bottom:4px">&#x26A1; IN THE CACHE</div>';
    data.cachedParts.forEach(function(c){
      h+='<div style="font-size:12px;color:#d1d5db;margin-top:4px">';
      h+=(c.partType||'Part')+' &mdash; claimed by '+(c.claimedBy||'?')+' via '+c.source+' &middot; '+ta(c.claimedAt);
      if(c.yardName)h+=' &middot; '+c.yardName;
      h+='</div>';
    });
    h+='</div>';
  }

  // Platform siblings
  if(v.platform_siblings&&v.platform_siblings.length>0){
    h+='<div class="card"><div class="card-title">Platform Siblings</div>';
    h+='<div style="font-size:11px;color:#9CA3AF">'+v.platform_siblings.map(function(s){return esc(s)}).join(', ')+'</div>';
    h+='</div>';
  }

  // Scan another
  h+='<div style="padding:0 0 12px"><button class="btn btn-red" style="width:100%;padding:12px;font-size:14px;" onclick="V.value=\'\';V.focus();document.getElementById(\'results\').innerHTML=\'\';">Scan Another</button></div>';

  document.getElementById('results').innerHTML=h;
}

function renderPartDetail(p,data){
  var h='<div class="part-detail'+(p.isExcluded?' excluded':'')+(p.specMismatch?' spec-mismatch':'')+'">';
  h+='<div class="pd-header">';
  // Left: badges + title
  h+='<div class="pd-title">';
  // Intel source badges (expanded view — full label, not just icon)
  if(p.intelSources&&p.intelSources.length>0){
    if(p.intelSources.includes('mark'))h+='<span style="font-size:9px;font-weight:700;padding:2px 6px;border-radius:3px;background:#8B6914;color:#FFD700;margin-right:3px">&#x1F3AF; MARK</span>';
    else if(p.intelSources.includes('quarry'))h+='<span class="intel-fire" style="font-size:9px;font-weight:700;padding:2px 6px;border-radius:3px;background:#7c2d12;color:#f97316;margin-right:3px">&#x1F525; QUARRY</span>';
    else if(p.intelSources.includes('stream')||p.intelSources.includes('restock'))h+='<span style="font-size:9px;font-weight:700;padding:2px 6px;border-radius:3px;background:#1e3a5f;color:#3b82f6;margin-right:3px">&#x1F501; STREAM</span>';
    if(p.overstockWarning)h+='<span style="font-size:9px;font-weight:700;padding:2px 6px;border-radius:3px;background:#7f1d1d;color:#ef4444;margin-right:3px">&#x2715; OVER</span>';
  }
  // Archives badge
  if(p.priceSource==='item_reference')h+='<span class="archives-badge" style="display:inline-block;background:#FFC107;color:#000;font-size:8px;font-weight:700;padding:1px 5px;border-radius:3px;margin-right:3px">ARCHIVES</span>';
  // Novelty badge (if no intel/archives)
  else if(!p.intelSources||p.intelSources.length===0){
    if(p.noveltyTier==='NOVEL')h+='<span style="font-size:8px;font-weight:700;padding:1px 5px;border-radius:3px;background:#06b6d4;color:#000;margin-right:3px">NEW</span>';
    else if(p.noveltyTier==='RESTOCK')h+='<span style="font-size:8px;font-weight:700;padding:1px 5px;border-radius:3px;background:#22c55e;color:#000;margin-right:3px">RESTOCK</span>';
  }
  // Synthetic scout alert badge
  if(p.isSynthetic)h+='<span style="font-size:9px;font-weight:700;padding:2px 6px;border-radius:3px;background:#f59e0b;color:#000;margin-right:3px;animation:pulse-gold 2s infinite">&#x1F4E2; ALERT '+(p.scoutAlertScore||'')+'</span>';
  else if(p.scoutAlertMatch)h+='<span style="font-size:9px;font-weight:700;padding:2px 6px;border-radius:3px;background:#FFD700;color:#000;margin-right:3px">&#x1F3AF; SA '+(p.scoutAlertScore||'')+'</span>';
  // Part type + title
  if(p.partType)h+='['+esc(p.partType)+'] ';
  h+=esc((p.title||p.category||'Part').substring(0,80));
  h+='</div>';
  // Right: verdict badge
  var dp=p.displayPrice||p.price||0;
  var vb=verdictBadge(dp,p.priceSource);
  var fresh=freshIcon(p.yourSaleLatest||p.marketCheckedAt||p.lastSoldDate);
  h+='<div class="pd-verdict '+vb.cls+'">'+vb.text+fresh+'</div>';
  h+='</div>';

  // Stats row
  h+='<div class="pd-stats">';
  h+='<span>'+(p.in_stock||0)+' in stock'+(p.stockMatchType==='base'?' <span style="color:#FF8C00;font-size:9px" title="Stock matched by base PN, verify exact PN">&#x26A0; verify PN</span>':'')+'</span>';
  h+='<span>'+(p.sold_90d||0)+' sold/90d</span>';
  if(p.partNumber)h+='<span style="font-family:monospace;font-size:9px;color:#6B7280">'+esc(p.partNumber.substring(0,30))+'</span>';
  h+='</div>';

  // YourSale data
  if(p.yourSalePrice>0&&p.priceSource!=='sold'){
    h+='<div style="font-size:10px;color:#22c55e;margin-top:2px">YourSale: $'+Math.round(p.yourSalePrice)+' avg ('+p.yourSaleCount+'x sold)</div>';
  }

  // Market comparison
  if(p.marketMedian>0){
    var hasOurSales=p.priceSource==='sold'||p.yourSalePrice>0;
    var mColor=hasOurSales?'#6B7280':'#10B981';
    h+='<div style="font-size:10px;color:'+mColor+';margin-top:1px">Market ref $'+Math.round(p.marketMedian)+' med | '+(p.marketCount||0)+' sold'+(p.marketVelocity?' | '+p.marketVelocity+'/wk':'')+'</div>';
  }

  // Spec mismatch reason
  if(p.specMismatch&&p.mismatchReason){
    h+='<div style="font-size:10px;color:#ef4444;margin-top:2px">&#x26A0;&#xFE0F; '+esc(p.mismatchReason)+'</div>';
  }

  // Trim multiplier note
  if(p.trimMultiplier!=null&&p.trimMultiplier<1){
    var tmColor=p.trimMultiplier===0?'#ef4444':'#f59e0b';
    var tmText=p.trimMultiplier===0?'Not expected on this trim':'&#x26A0;&#xFE0F; Verify on vehicle ('+Math.round(p.trimMultiplier*100)+'% confidence)';
    h+='<div style="font-size:10px;color:'+tmColor+';margin-top:2px">'+tmText+'</div>';
  }

  // Dead warning
  if(p.deadWarning){
    h+='<div style="font-size:10px;color:#ef4444;margin-top:2px">&#x2620;&#xFE0F; '+esc(typeof p.deadWarning==='string'?p.deadWarning:p.deadWarning.message||'Dead inventory warning')+'</div>';
  }

  // Reason
  if(p.reason&&!p.specMismatch)h+='<div class="pd-reason">'+esc(p.reason)+'</div>';

  // Pull button
  h+='<div style="margin-top:4px"><button class="btn-pull" onclick="pullPart(\''+esc(p.partType||'')+'\',\''+esc(p.partNumber||'')+'\',this)">Pull</button></div>';

  h+='</div>';
  return h;
}

function pullPart(partType,partNumber,btn){
  btn.disabled=true;btn.textContent='Caching...';
  fetch('/cache/claim',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
    partType:partType,
    partNumber:partNumber||null,
    partDescription:partType+' \u2014 '+(_lastYear||'')+' '+(_lastMake||'')+' '+(_lastModel||''),
    vehicle:{year:_lastYear||null,make:_lastMake||null,model:_lastModel||null,vin:_lastVin||null},
    source:'hawk_eye',
    sourceId:_lastVin||null,
  })}).then(function(r){return r.json()}).then(function(d){
    if(d.success){btn.textContent='Cached \u2713';btn.className='btn-pull btn-cached';btn.style.borderColor='#065f46';btn.style.background='#064e3b';}
    else{btn.disabled=false;btn.textContent='Pull';}
  }).catch(function(){btn.disabled=false;btn.textContent='Pull';});
}

function loadHistory(el){
  if(el)el.textContent='Loading...';
  fetch('/vin/history?limit=10').then(function(r){return r.json()}).then(function(d){
    if(!d.success||!d.scans||!d.scans.length){document.getElementById('histArea').innerHTML='<div class="section-empty">No scans yet</div>';return;}
    var h='<div class="card"><div class="card-title">Recent Scans</div>';
    d.scans.forEach(function(s){
      var v=[s.year,s.make,s.model].filter(Boolean).join(' ');
      var eng=s.engine?' &middot; '+s.engine:'';
      var dt=s.drivetrain?' &middot; '+s.drivetrain:'';
      h+='<div class="h-row" onclick="V.value=\''+s.vin+'\';doScan()"><div><div class="h-vin">'+s.vin+'</div><div class="h-veh">'+(v||'Unknown')+'<span style="color:#6B7280;font-weight:400">'+eng+dt+'</span></div></div><div><div class="h-time">'+ta(s.scanned_at)+'</div></div></div>';
    });
    h+='</div>';
    document.getElementById('histArea').innerHTML=h;
  }).catch(function(){document.getElementById('histArea').innerHTML='<div class="section-empty">Could not load history</div>';});
}
</script>
</body>
</html>
