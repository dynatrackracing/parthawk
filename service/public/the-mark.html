<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0a0a">
<title>DarkHawk — THE MARK</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0a0a;--s:#141414;--s2:#1a1a1a;--b:#2a2a2a;--r:#DC2626;--g:#22c55e;--y:#eab308;--t:#F0F0F0;--tm:#d1d5db;--tf:#6b7280}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--t);min-height:100vh;padding-bottom:60px}
.c{padding:12px;max-width:600px;margin:0 auto}
.card{background:var(--s);border:1px solid var(--b);border-radius:10px;padding:14px;margin-bottom:10px}
.section-title{font-size:10px;font-weight:700;color:var(--tf);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
.stat-bar{display:flex;gap:12px;font-size:11px;color:var(--tf);margin-bottom:12px;flex-wrap:wrap}
.stat-bar b{color:var(--tm)}
.mark-card{background:var(--s2);border:1px solid var(--b);border-radius:8px;padding:12px;margin-bottom:8px}
.mark-title{font-size:13px;font-weight:600;line-height:1.3}
.mark-meta{font-size:10px;color:var(--tf);margin-top:4px;display:flex;gap:8px;flex-wrap:wrap}
.mark-actions{display:flex;gap:6px;margin-top:8px}
.badge{font-size:9px;font-weight:700;padding:2px 6px;border-radius:3px}
.b-sky{background:#1e3a5f;color:#60a5fa}
.b-perch{background:#422006;color:#f59e0b}
.b-yard{background:#064e3b;color:#22c55e}
.b-sold{background:#064e3b;color:#22c55e}
.b-listed{background:#064e3b;color:#22c55e}
.b-hunting{background:#7f1d1d;color:#dc2626}
.b-wl{background:#4c1d95;color:#a78bfa}
.btn{padding:6px 12px;border-radius:6px;border:1px solid var(--b);background:var(--s);color:var(--tm);font-size:10px;font-weight:700;cursor:pointer}
.btn:disabled{opacity:.3}
.btn-red{background:var(--r);color:#fff;border-color:var(--r)}
.btn-green{border-color:#065f46;color:var(--g)}
.btn-purple{border-color:#6d28d9;color:#a78bfa}
.b-review{background:#78350f;color:#fbbf24;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
.mark-card.needs-review{border-color:#78350f}
.edit-row{display:flex;gap:4px;margin-top:6px;flex-wrap:wrap;align-items:center}
.edit-field{padding:4px 6px;border:1px solid var(--b);border-radius:4px;background:var(--s);color:var(--t);font-size:11px;outline:none;width:auto}
.edit-field:focus{border-color:var(--y)}
.edit-field.yr{width:56px}
.edit-field.med{width:100px}
.edit-label{font-size:9px;color:var(--tf);font-weight:600}
.saved-indicator{font-size:9px;color:var(--g);font-weight:700;opacity:0;transition:opacity .3s}
input,textarea{padding:8px 10px;border:1px solid var(--b);border-radius:6px;background:var(--s2);color:var(--t);font-size:13px;width:100%;outline:none}
input:focus,textarea:focus{border-color:var(--r)}
.empty{text-align:center;color:var(--tf);padding:30px;font-size:13px}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#064e3b;color:#22c55e;padding:10px 20px;border-radius:8px;font-size:12px;font-weight:700;z-index:999;display:none}
.find-btn{width:28px;height:28px;border-radius:6px;border:1px solid var(--b);background:var(--s2);color:#9CA3AF;font-size:12px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;padding:0}
.find-btn:active{opacity:.5}
.find-btn.has-results{color:var(--g);border-color:#064e3b}
.yard-results{margin-top:6px;padding:8px;background:var(--bg);border-radius:6px;border:1px solid var(--b);font-size:11px}
.yard-row{padding:4px 0;border-bottom:1px solid var(--s);color:var(--tm)}
.yard-row:last-child{border-bottom:none}
.yard-name{color:var(--g);font-weight:600}
.yard-loc{color:#9CA3AF}
.yard-age{color:var(--tf);font-size:10px}
.search-wrap{position:sticky;top:0;z-index:10;background:var(--bg);padding:8px 0 4px}
.search-count{font-size:10px;color:var(--tf);margin-top:4px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="dh-nav"></div>
<script src="/admin/dh-nav.js?v=3"></script><script>dhNav('mark')</script>

<div class="c">
  <div class="stat-bar" id="stats">Loading...</div>

  <!-- Manual entry -->
  <div class="card">
    <div class="section-title">ADD TO WANT LIST</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <input type="text" id="wlTitle" placeholder="Part description (e.g. 2015 Jeep Grand Cherokee ECM)" style="flex:1;min-width:200px">
      <button class="btn btn-green" onclick="addToWantList()">Add</button>
    </div>
    <div id="wlResult" style="margin-top:6px;font-size:11px"></div>
  </div>

  <!-- Search + Marks list -->
  <div class="search-wrap">
    <input type="text" id="markSearch" placeholder="Search marks by part, make, model, or title..." style="font-size:12px">
    <div class="search-count" id="searchCount"></div>
  </div>
  <div class="section-title" style="padding:0 0 4px">ACTIVE MARKS (<span id="markCount">0</span>)</div>
  <div id="marksList"></div>

  <!-- Hidden Parts section -->
  <div style="margin-top:16px;border-top:1px solid #2a2a2a;padding-top:12px">
    <div onclick="toggleHidden()" style="font-size:11px;font-weight:700;color:#6B7280;cursor:pointer;user-select:none;display:flex;justify-content:space-between;align-items:center">
      <span><span id="hiddenArrow">▸</span> HIDDEN PARTS (<span id="hiddenCount">0</span>)</span>
      <span style="font-size:9px;color:#4B5563">tap to expand</span>
    </div>
    <div id="hiddenList" style="display:none;margin-top:8px"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
function esc(s){if(!s)return'';var d=document.createElement('div');d.textContent=s;return d.innerHTML}
function timeAgo(ds){if(!ds)return'';var ms=Date.now()-new Date(ds).getTime();var m=Math.floor(ms/60000);if(m<60)return m+'m ago';var h=Math.floor(m/60);if(h<24)return h+'h ago';return Math.floor(h/24)+'d ago'}
function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.style.display='block';setTimeout(function(){t.style.display='none'},2500)}

var _marks = [];
var _wantListTitles = new Set();
var _searchTimer = null;

function debounce(fn, ms) {
  return function() {
    var args = arguments, ctx = this;
    clearTimeout(_searchTimer);
    _searchTimer = setTimeout(function() { fn.apply(ctx, args); }, ms);
  };
}

document.getElementById('markSearch').addEventListener('input', debounce(function(e) {
  var q = e.target.value.toLowerCase().trim();
  if (!q) {
    renderMarks(_marks);
    document.getElementById('searchCount').textContent = '';
    return;
  }
  var filtered = _marks.filter(function(m) {
    var haystack = [m.partNumber, m.originalTitle, m.normalizedTitle, m.partType, m.source, m.notes].join(' ').toLowerCase();
    return haystack.indexOf(q) !== -1;
  });
  renderMarks(filtered);
  document.getElementById('searchCount').textContent = 'Showing ' + filtered.length + ' of ' + _marks.length + ' marks';
}, 150));

async function loadMarks() {
  try {
    var [markResp, wlResp] = await Promise.all([
      fetch('/competitors/marks').then(function(r){return r.json()}),
      fetch('/restock-want-list/titles').then(function(r){return r.json()}).catch(function(){return{items:[]}})
    ]);

    _marks = markResp.marks || [];
    _wantListTitles = new Set((wlResp.items||[]).map(function(e){return(e.title||'').substring(0,40).toLowerCase()}));

    document.getElementById('markCount').textContent = _marks.length;

    // Stats
    var hunting=0, inYard=0, listed=0, sold=0;
    _marks.forEach(function(m){
      if(m.status==='in-yard')inYard++;
      else if(m.status==='listed')listed++;
      else if(m.status==='sold')sold++;
      else hunting++;
    });
    document.getElementById('stats').innerHTML =
      'Total: <b>' + _marks.length + '</b> · Hunting: <b>' + hunting + '</b> · In yard: <b style="color:#22c55e">' + inYard + '</b> · Listed: <b style="color:#22c55e">' + listed + '</b> · Sold: <b style="color:#22c55e">' + sold + '</b>';

    // Re-apply current search filter
    var q = document.getElementById('markSearch').value.toLowerCase().trim();
    if (q) {
      var filtered = _marks.filter(function(m) {
        var haystack = [m.partNumber, m.originalTitle, m.normalizedTitle, m.partType, m.source, m.notes].join(' ').toLowerCase();
        return haystack.indexOf(q) !== -1;
      });
      renderMarks(filtered);
      document.getElementById('searchCount').textContent = 'Showing ' + filtered.length + ' of ' + _marks.length + ' marks';
    } else {
      renderMarks(_marks);
      document.getElementById('searchCount').textContent = '';
    }
  } catch (err) {
    document.getElementById('marksList').innerHTML = '<div class="empty">Error loading marks: ' + esc(err.message) + '</div>';
  }
}

function renderMarks(marks) {
  var h = '';
  if (marks.length === 0) {
    h = '<div class="empty">No marks found.</div>';
    document.getElementById('marksList').innerHTML = h;
    return;
  }
  marks.forEach(function(m) {
    var srcBadge = m.source === 'SKY' ? '<span class="badge b-sky">SKY WATCH</span>' :
                   m.source === 'PERCH' ? '<span class="badge b-perch">PERCH</span>' : '<span class="badge" style="background:#333;color:#9CA3AF">' + esc(m.source||'?') + '</span>';
    var statusBadge = m.status === 'in-yard' ? '<span class="badge b-yard">IN YARD</span>' :
                      m.status === 'listed' ? '<span class="badge b-listed">LISTED</span>' :
                      m.status === 'sold' ? '<span class="badge b-sold">SOLD</span>' :
                      '<span class="badge b-hunting">HUNTING</span>';
    var reviewBadge = m.needs_review ? ' <span class="badge b-review" title="Year could not be determined automatically — fill in year_start and year_end">NEEDS REVIEW</span>' : '';

    var wlKey = (m.originalTitle||'').substring(0,40).toLowerCase();
    var inWantList = _wantListTitles.has(wlKey);

    h += '<div class="mark-card' + (m.needs_review ? ' needs-review' : '') + '" id="mark-' + m.id + '">';
    h += '<div class="mark-title">' + esc(m.originalTitle) + '</div>';
    h += '<div class="mark-meta">';
    h += srcBadge + ' ' + statusBadge + reviewBadge;
    if (m.partType) h += ' <span>' + esc(m.partType) + '</span>';
    if (m.medianPrice) h += ' <span style="color:#22c55e;font-weight:700">$' + m.medianPrice + '</span>';
    if (m.partNumber) h += ' <span style="font-family:monospace">' + esc(m.partNumber) + '</span>';
    h += ' <span>' + timeAgo(m.markedAt) + '</span>';
    if (inWantList) h += ' <span class="badge b-wl">IN WANT LIST</span>';
    h += '</div>';
    // Editable vehicle fields
    h += '<div class="edit-row">';
    h += '<span class="edit-label">Year:</span>';
    h += '<input class="edit-field yr" type="number" min="1980" max="2035" placeholder="Start" value="' + (m.year_start||'') + '" onchange="saveField(\'' + m.id + '\',\'year_start\',this.value,this)">';
    h += '<span style="color:#6B7280">–</span>';
    h += '<input class="edit-field yr" type="number" min="1980" max="2035" placeholder="End" value="' + (m.year_end||'') + '" onchange="saveField(\'' + m.id + '\',\'year_end\',this.value,this)">';
    h += '<span class="edit-label" style="margin-left:6px">Make:</span>';
    h += '<input class="edit-field med" type="text" placeholder="Make" value="' + esc(m.make||'') + '" onchange="saveField(\'' + m.id + '\',\'make\',this.value,this)">';
    h += '<span class="edit-label">Model:</span>';
    h += '<input class="edit-field med" type="text" placeholder="Model" value="' + esc(m.model||'') + '" onchange="saveField(\'' + m.id + '\',\'model\',this.value,this)">';
    h += '<span class="saved-indicator" id="saved-' + m.id + '">Saved</span>';
    h += '</div>';
    h += '<div class="mark-actions">';
    h += '<button class="find-btn" onclick="findInYard(\'' + m.id + '\',this)" title="Find in yard"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg></button>';
    if (!inWantList) {
      h += '<button class="btn btn-purple" onclick="pushToWantList(\'' + m.id + '\',\'' + esc(m.originalTitle).replace(/'/g,"\\'") + '\',this)">Send to want list</button>';
    }
    h += '<button class="btn" onclick="deleteMark(\'' + m.id + '\',this)">Remove</button>';
    h += '<button class="btn" style="color:#dc2626;border-color:#7f1d1d" onclick="hideMark(\'' + m.id + '\',\'' + esc(m.partNumber || m.originalTitle || '').replace(/'/g,"\\'") + '\',this)">✕ Hide</button>';
    if (m.notes) h += '<span style="font-size:10px;color:#6B7280;margin-left:auto">' + esc(m.notes) + '</span>';
    h += '</div>';
    h += '<div id="yard-' + m.id + '"></div>';
    h += '</div>';
  });
  document.getElementById('marksList').innerHTML = h;
}

async function hideMark(markId, pnOrTitle, btn) {
  btn.disabled = true;
  try {
    // Add to hidden_parts — must succeed before we delete the mark
    var hideResp = await fetch('/hidden/add', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ partNumberBase: pnOrTitle.substring(0, 40), source: 'mark' }) }).then(function(r){ return r.json(); });
    if (!hideResp.success) {
      showToast('Failed to hide: ' + (hideResp.error || 'unknown error'));
      btn.disabled = false;
      return;
    }
    // Hidden insert succeeded — now delete the mark
    await fetch('/competitors/mark/' + markId, { method: 'DELETE' }).then(function(r){ return r.json(); }).catch(function(e){ console.error('Mark delete failed:', e); });
    var el = btn.closest('.mark-card');
    if (el) { el.style.background = '#3d0a0a'; el.style.opacity = '0'; setTimeout(function(){ el.remove(); }, 400); }
    showToast('Part hidden — will not appear on any intel page');
    setTimeout(loadMarks, 500);
  } catch (e) { btn.disabled = false; console.error('hideMark error:', e); }
}

async function deleteMark(id, btn) {
  btn.disabled = true;
  try {
    var resp = await fetch('/competitors/mark/' + id, { method: 'DELETE' });
    var d = await resp.json();
    if (d.success) {
      var el = document.getElementById('mark-' + id);
      if (el) { el.style.opacity = '0'; setTimeout(function(){ el.remove(); }, 300); }
      showToast('Mark removed — item returned to source list');
      setTimeout(loadMarks, 500);
    }
  } catch (e) { btn.disabled = false; }
}

async function pushToWantList(markId, title, btn) {
  btn.disabled = true; btn.textContent = '...';
  try {
    var resp = await fetch('/restock-want-list/add', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ title: title, notes: '[mark_push] From The Mark', auto_generated: false }),
    });
    var d = await resp.json();
    if (d.success) {
      btn.textContent = 'In want list';
      btn.style.color = '#a78bfa';
      btn.style.borderColor = '#6d28d9';
      showToast('Added to want list');
    } else { btn.disabled = false; btn.textContent = 'Send to want list'; }
  } catch (e) { btn.disabled = false; btn.textContent = 'Send to want list'; }
}

async function addToWantList() {
  var title = document.getElementById('wlTitle').value.trim();
  if (!title || title.length < 5) { document.getElementById('wlResult').innerHTML = '<span style="color:#dc2626">Enter a description (min 5 chars)</span>'; return; }
  try {
    var resp = await fetch('/restock-want-list/add', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ title: title, notes: '[manual] Direct entry from The Mark page', auto_generated: false }),
    });
    var d = await resp.json();
    if (d.success) {
      document.getElementById('wlTitle').value = '';
      document.getElementById('wlResult').innerHTML = '<span style="color:#22c55e">Added to want list</span>';
      showToast('Added to Scour Stream want list');
    } else {
      document.getElementById('wlResult').innerHTML = '<span style="color:#dc2626">' + esc(d.error || 'Failed') + '</span>';
    }
  } catch (e) {
    document.getElementById('wlResult').innerHTML = '<span style="color:#dc2626">Error: ' + esc(e.message) + '</span>';
  }
}

// Hidden parts
var hiddenOpen = false;
function toggleHidden() {
  hiddenOpen = !hiddenOpen;
  document.getElementById('hiddenList').style.display = hiddenOpen ? 'block' : 'none';
  document.getElementById('hiddenArrow').textContent = hiddenOpen ? '▾' : '▸';
  if (hiddenOpen) loadHidden();
}

async function loadHidden() {
  try {
    var resp = await fetch('/hidden/list');
    var d = await resp.json();
    document.getElementById('hiddenCount').textContent = d.total || 0;
    if (!d.items || d.items.length === 0) {
      document.getElementById('hiddenList').innerHTML = '<div style="font-size:11px;color:#6B7280;padding:8px 0">No hidden parts</div>';
      return;
    }
    var h = '';
    d.items.forEach(function(item) {
      h += '<div style="display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid #1f1f1f;font-size:11px">';
      h += '<span style="color:#9CA3AF"><span style="font-family:monospace;color:#F0F0F0;font-weight:600">' + esc(item.part_number_base) + '</span>';
      if (item.make) h += ' ' + esc(item.make);
      if (item.model) h += ' ' + esc(item.model);
      h += ' <span style="color:#6B7280">(' + esc(item.source) + ')</span></span>';
      h += '<button style="font-size:9px;padding:2px 8px;border:1px solid #333;border-radius:4px;background:transparent;color:#22c55e;cursor:pointer" onclick="unhide(\'' + item.id + '\',this)">Unhide</button>';
      h += '</div>';
    });
    document.getElementById('hiddenList').innerHTML = h;
  } catch(e) { document.getElementById('hiddenList').innerHTML = '<div style="color:#dc2626;font-size:11px">Error loading hidden parts</div>'; }
}

async function unhide(id, btn) {
  btn.disabled = true;
  try {
    await fetch('/hidden/' + id, { method: 'DELETE' });
    btn.closest('div').remove();
    var cnt = parseInt(document.getElementById('hiddenCount').textContent) - 1;
    document.getElementById('hiddenCount').textContent = Math.max(0, cnt);
    showToast('Part unhidden');
  } catch(e) { btn.disabled = false; }
}

function findInYard(markId, btn) {
  var mark = null;
  for (var i = 0; i < _marks.length; i++) { if (_marks[i].id === markId) { mark = _marks[i]; break; } }
  if (!mark) return;

  var el = document.getElementById('yard-' + markId);
  // Toggle off if already showing
  if (el.innerHTML) { el.innerHTML = ''; btn.classList.remove('has-results'); return; }

  el.innerHTML = '<div class="yard-results"><div style="color:#6B7280;text-align:center"><div class="spinner" style="width:14px;height:14px;display:inline-block;border:2px solid #333;border-top-color:#22c55e;border-radius:50%;animation:spin .6s linear infinite"></div> Searching yards...</div></div>';

  fetch('/restock-want-list/find-in-yard', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ title: mark.originalTitle || mark.normalizedTitle }) })
    .then(function(r) { return r.json(); })
    .then(function(d) {
      if (!d.success || !d.vehicles || d.vehicles.length === 0) {
        el.innerHTML = '<div class="yard-results"><div style="color:#6B7280;text-align:center">No matching vehicles on current set lists</div></div>';
        return;
      }
      btn.classList.add('has-results');
      var h = '<div class="yard-results">';
      h += '<div style="font-size:9px;font-weight:700;color:#6B7280;text-transform:uppercase;margin-bottom:4px">' + d.vehicles.length + ' vehicle' + (d.vehicles.length > 1 ? 's' : '') + ' found in yards</div>';
      d.vehicles.forEach(function(v) {
        h += '<div class="yard-row">';
        h += '<span style="font-weight:600">' + esc(v.year + ' ' + v.make + ' ' + v.model) + '</span>';
        if (v.color) h += ' <span style="color:#6B7280">(' + esc(v.color) + ')</span>';
        h += ' — <span class="yard-name">' + esc(v.yard) + '</span>';
        h += ' <span class="yard-loc">Row ' + esc(v.row) + '</span>';
        h += ' <span class="yard-age">set ' + v.daysAgo + '</span>';
        h += '</div>';
      });
      h += '</div>';
      el.innerHTML = h;
    })
    .catch(function(err) {
      el.innerHTML = '<div class="yard-results" style="color:#dc2626">Error: ' + err.message + '</div>';
    });
}

async function saveField(markId, field, value, inputEl) {
  try {
    var body = {};
    body[field] = value || null;
    // If saving year_end together with year_start, send both
    if (field === 'year_start' || field === 'year_end') {
      var card = document.getElementById('mark-' + markId);
      if (card) {
        var inputs = card.querySelectorAll('.edit-field.yr');
        body.year_start = inputs[0] ? (inputs[0].value || null) : null;
        body.year_end = inputs[1] ? (inputs[1].value || null) : null;
      }
    }
    var resp = await fetch('/competitors/mark/' + markId, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    var d = await resp.json();
    if (d.success) {
      var indicator = document.getElementById('saved-' + markId);
      if (indicator) { indicator.style.opacity = '1'; setTimeout(function(){ indicator.style.opacity = '0'; }, 1500); }
      // Reload after saving year fields to update needs_review status
      if (field === 'year_start' || field === 'year_end') {
        setTimeout(loadMarks, 800);
      }
    }
  } catch (e) { console.error('saveField error:', e); }
}

loadMarks();
fetch('/hidden/list').then(function(r){return r.json()}).then(function(d){document.getElementById('hiddenCount').textContent = d.total || 0}).catch(function(){});
</script>
</body>
</html>
